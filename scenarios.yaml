scenarios:
  - name: "test_sms_rec_happy_path"
    prompt: >
      請幫我建立一個 SMS 行銷活動，使用推薦商品模型，單一商品，不需要指定受眾。
    controller_instructions: >
      這是一個 REC flow 的 SMS 測試。對話風格簡潔合作。
      不要讓 agent 建立 segment，使用 All Users。
      當 agent 提供推薦情境選項時，選擇使用現有的情境。
      當 agent 問商品預設值時，讓 agent 用 searchProduct 搜尋。
      盡量接受 agent 的建議，快速推進流程。
    steps:
      - when: "agent 問受眾"
        reply: "用 All Users"
      - when: "agent 問發送時間"
        reply: "明天早上 10 點"
      - when: "agent 問是否要建立新的推薦情境"
        reply: "使用現有的情境就好"
      - when: "agent 問商品資訊或預設值"
        reply: "幫我搜尋推薦的商品"
      - when: "agent 提供內容草稿或預覽，詢問是否確認"
        reply: "確認，沒問題"
    review_instructions: >
      這是一個 SMS + REC flow 的 E2E 測試。
      驗證 agent 是否正確執行推薦商品流程並完成 SMS 行銷活動建立。
      重點檢查 tool call 的 input/output 一致性。
    responses:
      - name: "scenario_id_binding"
        description: >
          User-selected scenario_id 在所有下游 tool call 一致：
          getScenarioDetail(input), presentModelStatus(input),
          以及最終 tool 的 dynamic_syntax_config.scenario_id。
          如果這些 tool 有被呼叫，scenario_id 必須跨 tool 一致。
      - name: "flow_completion"
        description: >
          Agent 完成完整 REC flow 到達 SMS 的 final tool (presentCampaign)。
          presentCampaign 必須在 tool_calls 中出現且有完整的輸入參數。
          如果沒有到達 presentCampaign 則為 FAIL。
    max_turns: 30
